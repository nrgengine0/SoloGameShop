<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLO Realtime Game Sales Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Thint Ye Firebase Config fixed here!
        const firebaseConfig = {
            apiKey: "AIzaSyAtkK8QrsdAlT87VDZN4TNILGGYWyI5T6o",
            authDomain: "vor-solo.firebaseapp.com",
            databaseURL: "https://vor-solo-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "vor-solo",
            storageBucket: "vor-solo.firebasestorage.app",
            messagingSenderId: "856896766437",
            appId: "1:856896766437:web:a30e42fd58cf5d1ce8ef0c",
            measurementId: "G-GYH34JF85M"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Global references for internal functions
        window.dbRef = { ref, set, onValue, push, remove, update, db };
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-panel { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex relative overflow-hidden selection:bg-indigo-500 selection:text-white">

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden"></div>

    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-64 glass-panel h-full flex flex-col shadow-2xl z-30 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-4 flex justify-between items-center border-b border-gray-700">
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-500">SOLO Tracker 🌐</h1>
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-white p-1">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-2 px-4" id="sidebarMenu">
                <li><a href="#" id="menuDashboard" onclick="switchView('Dashboard')" class="block px-4 py-2 rounded-lg transition border-l-4 border-transparent hover:bg-gray-700"><i class="fa-solid fa-house w-6 text-indigo-400"></i> Dashboard</a></li>
                
                <li class="pt-4 pb-1"><span class="text-xs font-bold text-gray-400 uppercase tracking-wider block">🎮 PUBG MOBILE</span></li>
                <li><a href="#" id="menuPUBG" onclick="switchView('PUBG')" class="block px-4 py-2 rounded-lg transition border-l-4 border-transparent hover:bg-gray-700"><i class="fa-solid fa-coins w-6 text-orange-400"></i> Coin မှတ်ရန်</a></li>

                <li class="pt-4 pb-1"><span class="text-xs font-bold text-gray-400 uppercase tracking-wider block">⚔️ MOBILE LEGENDS</span></li>
                <li><a href="#" id="menuMLBB" onclick="switchView('MLBB')" class="block px-4 py-2 rounded-lg transition border-l-4 border-transparent hover:bg-gray-700"><i class="fa-solid fa-gem w-6 text-blue-400"></i> Diamond မှတ်ရန်</a></li>

                <div id="customGamesMenu"></div>

                <li class="pt-6 border-t border-gray-800 mt-4"><a href="#" id="menuSettings" onclick="switchView('Settings')" class="block px-4 py-2 rounded-lg transition border-l-4 border-transparent hover:bg-gray-700"><i class="fa-solid fa-gear w-6 text-gray-400"></i> Settings</a></li>
            </ul>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full bg-[#0f172a] overflow-hidden w-full">
        <header class="glass-panel p-4 flex justify-between items-center shadow-md">
            <div class="flex items-center space-x-3">
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-300 hover:text-white p-2 rounded-lg bg-gray-800 border border-gray-700">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h2 id="pageTitle" class="text-lg lg:text-xl font-bold text-indigo-400 truncate"><i class="fa-solid fa-house"></i> Dashboard</h2>
            </div>
            
            <div class="flex space-x-2 items-center" id="headerActions" style="display: none;">
                <div class="relative hidden sm:block">
                    <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="ရှာရန်..." class="w-40 md:w-full bg-gray-800 text-white rounded-lg pl-9 pr-4 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-gray-600">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-xs text-gray-400"></i>
                </div>
                <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 lg:px-4 lg:py-2 rounded-lg text-sm transition shadow-lg shadow-indigo-500/30 whitespace-nowrap">
                    <i class="fa-solid fa-plus"></i> Add Record
                </button>
            </div>
        </header>

        <div class="p-4 lg:p-6 flex-1 overflow-y-auto">
            
            <div id="mobileSearchContainer" class="mb-4 sm:hidden relative" style="display: none;">
                <input type="text" id="mobileSearchInput" onkeyup="searchTableMobile()" placeholder="🔍 ရှာရန်..." class="w-full bg-gray-800 text-white rounded-lg pl-10 pr-4 py-2 text-sm focus:outline-none border border-gray-600">
            </div>

            <div id="dashboardSection" class="space-y-6">
                <div id="dashboardGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4 lg:gap-6"></div>
            </div>

            <div id="tableSection" class="glass-panel rounded-xl shadow-xl overflow-hidden" style="display: none;">
                <div class="overflow-x-auto w-full">
                    <table class="w-full text-left border-collapse min-w-[500px]">
                        <thead>
                            <tr class="bg-gray-800 text-gray-300 border-b border-gray-700 text-sm">
                                <th class="p-3 lg:p-4" id="currencyHeader">Coin</th>
                                <th class="p-3 lg:p-4">ရောင်းဈေး</th>
                                <th class="p-3 lg:p-4">နေ့စွဲ</th>
                                <th class="p-3 lg:p-4 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="dataTable" class="divide-y divide-gray-800 text-sm"></tbody>
                    </table>
                </div>
            </div>

            <div id="settingsSection" class="max-w-xl mx-auto space-y-6" style="display: none;">
                <div class="glass-panel p-4 lg:p-6 rounded-2xl border border-dashed border-indigo-500/40">
                    <h3 class="text-md lg:text-lg font-bold text-indigo-400 mb-4"><i class="fa-solid fa-square-plus"></i> Add Other Game</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs lg:text-sm text-gray-400 mb-1">GAME NAME</label>
                            <input type="text" id="customGameName" placeholder="ဥပမာ - FREE FIRE" class="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 text-white outline-none">
                        </div>
                        <div>
                            <label class="block text-xs lg:text-sm text-gray-400 mb-1">💵 CURRENCY SYMBOL / TEXT</label>
                            <input type="text" id="customGameCurrency" placeholder="ဥပမာ - Diamond" class="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 text-white outline-none">
                        </div>
                        <button onclick="addCustomGame()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg text-sm transition shadow-lg shadow-indigo-500/20">
                            ➕ Add Other Game
                        </button>
                    </div>
                </div>

                <div class="glass-panel p-4 lg:p-6 rounded-2xl space-y-4">
                    <h3 class="text-md lg:text-lg font-bold text-purple-400 border-b border-gray-700 pb-2"><i class="fa-solid fa-gamepad"></i> ထည့်သွင်းထားသော အခြားဂိမ်းများ</h3>
                    <div id="customGamesDeleteList" class="divide-y divide-gray-800 space-y-3"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="recordModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden justify-center items-center z-50 p-4">
        <div class="bg-gray-800 rounded-xl p-5 lg:p-6 w-full max-w-sm border border-gray-700 shadow-2xl transform transition-all scale-95 opacity-0" id="modalContent">
            <h3 class="text-lg font-bold mb-4" id="modalTitle">မှတ်တမ်း အသစ်ထည့်ရန်</h3>
            <input type="hidden" id="recordId">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs lg:text-sm text-gray-400 mb-1" id="modalCurrencyLabel">Amount</label>
                    <input type="number" id="currencyAmount" class="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 text-white outline-none">
                </div>
                <div>
                    <label class="block text-xs lg:text-sm text-gray-400 mb-1">ရောင်းဈေး (Sale Price)</label>
                    <input type="number" id="salePrice" class="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 text-white outline-none">
                </div>
                <div>
                    <label class="block text-xs lg:text-sm text-gray-400 mb-1">နေ့စွဲ (Date)</label>
                    <input type="date" id="recordDate" class="w-full bg-gray-900 border border-gray-600 rounded-lg p-2 text-sm focus:ring-2 focus:ring-indigo-500 text-white outline-none">
                </div>
            </div>
            <div class="flex justify-end space-x-3 mt-6 text-sm">
                <button onclick="closeModal()" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg transition">Cancel</button>
                <button onclick="saveRecord()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-lg transition">Save</button>
            </div>
        </div>
    </div>

    <script>
        let currentView = 'Dashboard'; 
        let records = [];
        let customGames = [];

        window.addEventListener('load', () => {
            setTimeout(initFirebaseRealtime, 1500); 
        });

        function initFirebaseRealtime() {
            if(!window.dbRef) return;
            const { db, ref, onValue } = window.dbRef;

            onValue(ref(db, 'customGames'), (snapshot) => {
                const data = snapshot.val();
                customGames = [];
                if(data) {
                    Object.keys(data).forEach(key => {
                        customGames.push({ firebaseKey: key, ...data[key] });
                    });
                }
                updateSidebarAndDashboard();
                renderSettingsCustomGamesList();
            });

            onValue(ref(db, 'records'), (snapshot) => {
                const data = snapshot.val();
                records = [];
                if(data) {
                    Object.keys(data).forEach(key => {
                        records.push({ firebaseKey: key, ...data[key] });
                    });
                }
                if(currentView === 'Dashboard') calculateTotalsAndRenderCards();
                else renderTable();
            });
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function addCustomGame() {
            const name = document.getElementById('customGameName').value.trim();
            const currency = document.getElementById('customGameCurrency').value.trim();

            if(!name || !currency) return alert('ဖြည့်စွက်ပေးရန် လိုအပ်ပါသည်။');
            if(customGames.some(g => g.id.toLowerCase() === name.toLowerCase()) || name==='PUBG' || name==='MLBB') {
                return alert('ဂိမ်းအမည် ရှိပြီးသားဖြစ်နေသည်။');
            }

            const { db, ref, push } = window.dbRef;
            push(ref(db, 'customGames'), { id: name, name: name, currency: currency });

            document.getElementById('customGameName').value = '';
            document.getElementById('customGameCurrency').value = '';
        }

        function deleteCustomGame(firebaseKey, gameId) {
            if(confirm(`ဒီဂိမ်းနှင့် သက်ဆိုင်သော မှတ်တမ်းအားလုံးပါ အွန်လိုင်းမှ ဖျက်မှာ သေချာပါသလား?`)) {
                const { db, ref, remove } = window.dbRef;
                remove(ref(db, `customGames/${firebaseKey}`));
                records.forEach(r => {
                    if(r.game === gameId) remove(ref(db, `records/${r.firebaseKey}`));
                });
                if(currentView === gameId) currentView = 'Dashboard';
                switchView(currentView);
            }
        }

        function renderSettingsCustomGamesList() {
            const listContainer = document.getElementById('customGamesDeleteList');
            listContainer.innerHTML = '';
            if(customGames.length === 0) {
                listContainer.innerHTML = '<p class="text-xs text-gray-500 pt-2">ကိုယ်တိုင်ထည့်ထားသော ဂိမ်းမရှိသေးပါ</p>';
                return;
            }
            customGames.forEach(game => {
                listContainer.innerHTML += `
                    <div class="flex justify-between items-center pt-3">
                        <div class="pr-2 truncate">
                            <span class="font-semibold text-white block truncate text-sm">${game.name}</span>
                            <span class="text-xs text-gray-400 block truncate">💵 Currency: ${game.currency}</span>
                        </div>
                        <button onclick="deleteCustomGame('${game.firebaseKey}', '${game.id}')" class="bg-red-600/20 text-red-400 border border-red-500/30 hover:bg-red-600 hover:text-white px-2.5 py-1.5 rounded-lg text-xs font-semibold transition flex-shrink-0">
                            <i class="fa-solid fa-trash"></i> Delete
                        </button>
                    </div>`;
            });
        }

        function updateSidebarAndDashboard() {
            const container = document.getElementById('customGamesMenu');
            container.innerHTML = '';
            customGames.forEach(game => {
                container.innerHTML += `
                    <li class="pt-4 pb-1"><span class="text-xs font-bold text-gray-400 uppercase tracking-wider block">🎮 ${game.name}</span></li>
                    <li><a href="#" id="menu_${game.id}" onclick="switchView('${game.id}')" class="block px-4 py-2 rounded-lg transition border-l-4 border-transparent hover:bg-gray-700"><i class="fa-solid fa-gamepad w-6 text-purple-400"></i> ${game.currency} မှတ်ရန်</a></li>`;
            });
            if(currentView === 'Dashboard') calculateTotalsAndRenderCards();
        }

        function switchView(view) {
            currentView = view;
            const sidebar = document.getElementById('sidebar');
            if (!sidebar.classList.contains('-translate-x-full')) toggleSidebar();

            const title = document.getElementById('pageTitle');
            const currencyHeader = document.getElementById('currencyHeader');
            const modalLabel = document.getElementById('modalCurrencyLabel');
            const headerActions = document.getElementById('headerActions');
            const dashboardSection = document.getElementById('dashboardSection');
            const tableSection = document.getElementById('tableSection');
            const settingsSection = document.getElementById('settingsSection');
            const mobileSearch = document.getElementById('mobileSearchContainer');
            
            document.querySelectorAll('#sidebarMenu a').forEach(el => {
                el.className = "block px-4 py-2 rounded-lg transition border-l-4 border-transparent hover:bg-gray-700";
            });

            headerActions.style.display = 'none'; dashboardSection.style.display = 'none';
            tableSection.style.display = 'none'; settingsSection.style.display = 'none'; mobileSearch.style.display = 'none';

            if (view === 'Dashboard') {
                title.innerHTML = '<i class="fa-solid fa-house"></i> Dashboard';
                dashboardSection.style.display = 'block';
                document.getElementById('menuDashboard').className = "block px-4 py-2 rounded-lg bg-gray-800 border-l-4 border-indigo-500 transition";
                calculateTotalsAndRenderCards();
            } else if (view === 'Settings') {
                title.innerHTML = '<i class="fa-solid fa-gear"></i> Settings';
                settingsSection.style.display = 'block';
                document.getElementById('menuSettings').className = "block px-4 py-2 rounded-lg bg-gray-800 border-l-4 border-gray-500 transition";
                renderSettingsCustomGamesList();
            } else {
                headerActions.style.display = 'flex'; tableSection.style.display = 'block'; mobileSearch.style.display = 'block';
                if (view === 'PUBG') {
                    title.innerHTML = 'PUBG MOBILE'; currencyHeader.innerText = 'Coin'; modalLabel.innerText = 'Coin Amount';
                    document.getElementById('menuPUBG').className = "block px-4 py-2 rounded-lg bg-gray-800 border-l-4 border-orange-500 transition";
                } else if (view === 'MLBB') {
                    title.innerHTML = 'MOBILE LEGENDS'; currencyHeader.innerText = 'Diamond'; modalLabel.innerText = 'Diamond Amount';
                    document.getElementById('menuMLBB').className = "block px-4 py-2 rounded-lg bg-gray-800 border-l-4 border-blue-500 transition";
                } else {
                    const game = customGames.find(g => g.id === view);
                    if(game) {
                        title.innerHTML = game.name; currencyHeader.innerText = game.currency; modalLabel.innerText = `${game.currency} Amount`;
                        const m = document.getElementById(`menu_${view}`); if(m) m.className = "block px-4 py-2 rounded-lg bg-gray-800 border-l-4 border-purple-500 transition";
                    }
                }
                renderTable();
            }
        }

        function calculateTotalsAndRenderCards() {
            const grid = document.getElementById('dashboardGrid'); grid.innerHTML = '';
            const pubgTotal = records.filter(r => r.game === 'PUBG').reduce((sum, r) => sum + r.salePrice, 0);
            const mlbbTotal = records.filter(r => r.game === 'MLBB').reduce((sum, r) => sum + r.salePrice, 0);

            grid.innerHTML += `
                <div class="glass-panel p-5 lg:p-6 rounded-2xl relative overflow-hidden border-l-4 border-l-orange-500">
                    <div class="absolute right-4 top-4 text-orange-500/10 text-6xl font-bold">🎮</div>
                    <h4 class="text-gray-400 text-xs font-bold mb-2">PUBG MOBILE</h4>
                    <p class="text-2xl font-extrabold text-orange-400">${pubgTotal.toLocaleString()} Ks</p>
                </div>
                <div class="glass-panel p-5 lg:p-6 rounded-2xl relative overflow-hidden border-l-4 border-l-blue-500">
                    <div class="absolute right-4 top-4 text-blue-500/10 text-6xl font-bold">⚔️</div>
                    <h4 class="text-gray-400 text-xs font-bold mb-2">MOBILE LEGENDS</h4>
                    <p class="text-2xl font-extrabold text-blue-400">${mlbbTotal.toLocaleString()} Ks</p>
                </div>`;

            customGames.forEach(game => {
                const total = records.filter(r => r.game === game.id).reduce((sum, r) => sum + r.salePrice, 0);
                grid.innerHTML += `
                    <div class="glass-panel p-5 lg:p-6 rounded-2xl relative overflow-hidden border-l-4 border-l-purple-500">
                        <div class="absolute right-4 top-4 text-purple-500/10 text-6xl font-bold">💵</div>
                        <h4 class="text-gray-400 text-xs font-bold mb-2">${game.name}</h4>
                        <p class="text-2xl font-extrabold text-purple-400">${total.toLocaleString()} Ks</p>
                    </div>`;
            });
        }

        function renderTable(searchTerm = '') {
            const table = document.getElementById('dataTable'); table.innerHTML = '';
            const filtered = records.filter(r => r.game === currentView && (r.date.includes(searchTerm) || r.amount.toString().includes(searchTerm) || r.salePrice.toString().includes(searchTerm)));

            if(filtered.length === 0) {
                table.innerHTML = `<tr><td colspan="4" class="p-6 text-center text-gray-500">မှတ်တမ်း မရှိသေးပါ</td></tr>`;
                return;
            }
            filtered.forEach(record => {
                table.innerHTML += `
                    <tr class="hover:bg-gray-800/50 transition">
                        <td class="p-3 lg:p-4 font-semibold text-white">${record.amount.toLocaleString()}</td>
                        <td class="p-3 lg:p-4 text-emerald-400 font-medium">${record.salePrice.toLocaleString()}</td>
                        <td class="p-3 lg:p-4 text-gray-400">${record.date}</td>
                        <td class="p-3 lg:p-4 text-center whitespace-nowrap">
                            <button onclick="editRecord('${record.firebaseKey}')" class="text-blue-400 hover:text-blue-300 mx-2"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="deleteRecord('${record.firebaseKey}')" class="text-red-400 hover:text-red-300 mx-2"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        }

        function openModal(firebaseKey = null) {
            const modal = document.getElementById('recordModal');
            const content = document.getElementById('modalContent');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => content.classList.remove('scale-95', 'opacity-0'), 10);

            if (firebaseKey) {
                document.getElementById('modalTitle').innerText = 'မှတ်တမ်း ပြင်ဆင်ရန်';
                const record = records.find(r => r.firebaseKey === firebaseKey);
                document.getElementById('recordId').value = record.firebaseKey;
                document.getElementById('currencyAmount').value = record.amount;
                document.getElementById('salePrice').value = record.salePrice;
                document.getElementById('recordDate').value = record.date;
            } else {
                document.getElementById('modalTitle').innerText = 'မှတ်တမ်း အသစ်ထည့်ရန်';
                document.getElementById('recordId').value = '';
                document.getElementById('currencyAmount').value = '';
                document.getElementById('salePrice').value = '';
                document.getElementById('recordDate').valueAsDate = new Date();
            }
        }

        function closeModal() {
            const modal = document.getElementById('recordModal');
            document.getElementById('modalContent').classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 200);
        }

        function saveRecord() {
            const firebaseKey = document.getElementById('recordId').value;
            const amount = parseFloat(document.getElementById('currencyAmount').value) || 0;
            const salePrice = parseFloat(document.getElementById('salePrice').value) || 0;
            const date = document.getElementById('recordDate').value;

            const { db, ref, push, set, update } = window.dbRef;

            if (firebaseKey) {
                update(ref(db, `records/${firebaseKey}`), { amount, salePrice, date });
            } else {
                push(ref(db, 'records'), { game: currentView, amount, salePrice, date });
            }
            closeModal();
        }

        function editRecord(key) { openModal(key); }
        
        function deleteRecord(key) {
            if(confirm('ဖျက်မှာ သေချာပြီလား?')) {
                const { db, ref, remove } = window.dbRef;
                remove(ref(db, `records/${key}`));
            }
        }

        // Search Syc
        function searchTable() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            document.getElementById('mobileSearchInput').value = term; renderTable(term);
        }
        function searchTableMobile() {
            const term = document.getElementById('mobileSearchInput').value.toLowerCase();
            document.getElementById('searchInput').value = term; renderTable(term);
